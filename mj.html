<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
  <title>台灣麻將16張 - 橫向全螢幕版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      overscroll-behavior-y: none; /* 防止手機瀏覽器下拉重整 */ 
      overscroll-behavior-x: none;
    }
    
    /* 修正紅中與麻將牌的字體渲染：移除彩色 Emoji 字體，強制使用符號字體 */
    .mahjong-tile { 
      font-family: "Segoe UI Symbol", "Apple Symbols", "Arial Unicode MS", sans-serif; 
    }
    
    /* 隱藏捲軸 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-screen bg-emerald-900 flex justify-center text-white font-sans overflow-hidden select-none">

  <!-- 開局/轉向提示覆蓋層 -->
  <div id="start-overlay" class="absolute inset-0 z-[100] bg-emerald-950 flex flex-col items-center justify-center text-white p-4 transition-opacity duration-300">
    
    <!-- 直向時顯示警告 -->
    <div class="portrait:flex landscape:hidden flex-col items-center mb-6 text-red-400 animate-pulse">
      <svg class="w-16 h-16 mb-2 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
      <span class="text-xl font-bold">⚠️ 請將手機轉為「橫向」 ⚠️</span>
    </div>

    <!-- 標題與開始按鈕 -->
    <h1 class="text-4xl md:text-5xl font-bold text-yellow-400 mb-4 tracking-widest drop-shadow-lg">台灣麻將 16張</h1>
    <p class="mb-8 text-emerald-300 text-lg landscape:block portrait:hidden">已偵測到橫向模式，準備好即可開始！</p>
    <p class="mb-8 text-emerald-500 text-sm landscape:hidden">建議您轉動手機後再開始，以獲得最佳排版體驗</p>
    
    <button onclick="startGameUI()" class="bg-yellow-600 hover:bg-yellow-500 text-white px-12 py-4 rounded-2xl font-black text-2xl shadow-[0_6px_0_rgb(161,98,7)] active:shadow-[0_0px_0_rgb(161,98,7)] active:translate-y-1 transition-all">
      開始遊戲
    </button>
  </div>

  <!-- 遊戲主體容器 (移除 max-w-md，改為全螢幕滿版) -->
  <div class="w-full bg-emerald-800 h-full flex flex-col relative shadow-2xl">
    
    <!-- 頂部資訊：對手狀態與牌山 -->
    <header class="bg-emerald-950/80 p-1.5 px-3 flex justify-between items-center text-xs md:text-sm shadow-md z-10 flex-shrink-0">
      <div class="flex gap-4">
        <div id="info-p3" class="text-gray-400">上家(北): 16張</div>
        <div id="info-p2" class="text-gray-400">對家(西): 16張</div>
        <div id="info-p1" class="text-gray-400">下家(南): 16張</div>
      </div>
      <div class="bg-emerald-700 px-3 py-1 rounded text-yellow-300 font-bold border border-emerald-600 flex-shrink-0">
        剩餘牌數: <span id="deck-count" class="text-base">0</span>
      </div>
    </header>

    <!-- 中間：海底 (捨棄的牌) -->
    <main class="flex-1 p-2 overflow-y-auto hide-scrollbar relative bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-emerald-700 to-emerald-900">
      <div id="game-status" class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 opacity-20 text-5xl font-black text-white">
        <!-- 背景狀態浮水印 -->
      </div>
      
      <!-- 海底容器 -->
      <div id="sea-container" class="flex flex-wrap content-start gap-[2px] relative z-10 px-2">
        <!-- 捨牌動態生成 -->
      </div>
    </main>

    <!-- 玩家花牌與吃碰區 (明牌) -->
    <div class="bg-emerald-950/50 p-1 px-3 flex items-center h-8 md:h-10 border-t border-emerald-700/50 flex-shrink-0 overflow-hidden">
      <div class="text-[11px] md:text-xs text-emerald-400 mr-2 min-w-max">花牌/明牌區:</div>
      <div id="player-melds" class="flex gap-1 flex-nowrap overflow-x-auto hide-scrollbar"></div>
    </div>

    <!-- 動作按鈕區 (吃、碰、過) - 調整為高度適應橫向 -->
    <div id="action-bar" class="hidden absolute bottom-24 left-0 w-full bg-black/80 p-3 flex justify-center gap-6 z-50 backdrop-blur-md">
      <button onclick="handleAction('pong')" id="btn-pong" class="hidden bg-yellow-600 active:bg-yellow-500 px-8 py-2.5 rounded-xl font-bold text-2xl shadow-[0_4px_0_rgb(161,98,7)]">碰</button>
      <button onclick="handleAction('chi')" id="btn-chi" class="hidden bg-blue-600 active:bg-blue-500 px-8 py-2.5 rounded-xl font-bold text-2xl shadow-[0_4px_0_rgb(37,99,235)]">吃</button>
      <button onclick="handleAction('pass')" class="bg-gray-600 active:bg-gray-500 px-8 py-2.5 rounded-xl font-bold text-2xl shadow-[0_4px_0_rgb(75,85,99)]">過</button>
    </div>

    <!-- 底部：玩家手牌區 -->
    <footer class="bg-emerald-900 pb-3 pt-3 px-1 border-t-[3px] border-emerald-950 relative shadow-[0_-10px_20px_rgba(0,0,0,0.4)] w-full flex-shrink-0">
      
      <!-- 控制手牌絕對置中且不換行 -->
      <div class="flex items-end justify-center w-full">
        <!-- 手牌容器 -->
        <div id="hand-container" class="flex gap-[1px] sm:gap-[2px]"></div>
        
        <!-- 剛摸的牌 (給予分隔線與間距) -->
        <div class="ml-1 sm:ml-3 pl-1 sm:pl-3 border-l-2 border-emerald-700/50 flex flex-shrink-0">
          <div id="drawn-container"></div>
        </div>
      </div>

      <!-- 控制按鈕 -->
      <button onclick="startNewGame()" class="absolute top-2 right-3 text-xs md:text-sm bg-emerald-700 hover:bg-emerald-600 px-3 py-1.5 rounded text-emerald-100 font-bold shadow transition-colors">重新開局</button>
    </footer>

  </div>

  <script>
    // ==========================================
    // 1. 定義麻將牌資料
    // ==========================================
    const SUITS = [
      { type: '萬', chars: ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏'], baseWeight: 10 },
      { type: '筒', chars: ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡'], baseWeight: 20 },
      { type: '索', chars: ['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘'], baseWeight: 30 },
      { type: '風', chars: ['🀀','🀁','🀂','🀃'], names: ['東','南','西','北'], baseWeight: 40 },
      { type: '箭', chars: ['🀄\uFE0E','🀅\uFE0E','🀆\uFE0E'], names: ['中','發','白'], baseWeight: 50 },
    ];
    const FLOWERS = ['🀢','🀣','🀤','🀥','🀦','🀧','🀨','🀩'];

    // ==========================================
    // 2. 遊戲狀態變數
    // ==========================================
    let deck = [];
    let sea = []; 
    
    let players = [
      { id: 0, name: '你(東)', hand: [], flowers: [], melds: [], drawnTile: null },
      { id: 1, name: '下家(南)', hand: [], flowers: [], melds: [], drawnTile: null },
      { id: 2, name: '對家(西)', hand: [], flowers: [], melds: [], drawnTile: null },
      { id: 3, name: '上家(北)', hand: [], flowers: [], melds: [], drawnTile: null },
    ];

    let currentTurn = 0; 
    let gameState = 'idle'; 
    let pendingDiscard = null; 
    let actionOptions = { canPong: false, canChi: false };

    // ==========================================
    // 3. 核心邏輯
    // ==========================================

    // 關閉提示遮罩並開始遊戲
    function startGameUI() {
      document.getElementById('start-overlay').classList.add('hidden');
      if (gameState === 'idle') {
        startNewGame();
      }
    }

    function createShuffledDeck() {
      let newDeck = [];
      let idCounter = 0;
      SUITS.forEach(suit => {
        suit.chars.forEach((char, index) => {
          for (let i = 0; i < 4; i++) {
            newDeck.push({ id: idCounter++, char, weight: suit.baseWeight + index, type: suit.type, value: index + 1 });
          }
        });
      });
      FLOWERS.forEach((char, index) => {
        newDeck.push({ id: idCounter++, char, weight: 60 + index, type: '花' });
      });
      for (let i = newDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
      }
      return newDeck;
    }

    function sortHand(handArray) {
      return [...handArray].sort((a, b) => a.weight - b.weight);
    }

    function processFlowers(playerIndex) {
      let p = players[playerIndex];
      let hasFlower = true;
      while (hasFlower && deck.length > 0) {
        let fIndex = p.hand.findIndex(t => t.type === '花');
        if (fIndex >= 0) {
          let f = p.hand.splice(fIndex, 1)[0];
          p.flowers.push(f);
          p.hand.push(deck.pop()); 
        } else {
          hasFlower = false;
        }
      }
      while (p.drawnTile && p.drawnTile.type === '花' && deck.length > 0) {
        p.flowers.push(p.drawnTile);
        p.drawnTile = deck.pop();
      }
      p.hand = sortHand(p.hand);
    }

    function startNewGame() {
      deck = createShuffledDeck();
      sea = [];
      
      players.forEach(p => {
        p.hand = deck.splice(0, 16);
        p.flowers = [];
        p.melds = [];
        p.drawnTile = null;
        processFlowers(p.id); 
      });

      currentTurn = 0;
      players[0].drawnTile = deck.shift();
      processFlowers(0);

      gameState = 'playing';
      updateStatus("輪到你出牌");
      render();
    }

    function nextTurn() {
      if (deck.length === 0) {
        updateStatus("流局！");
        gameState = 'gameover';
        render();
        return;
      }

      currentTurn = (currentTurn + 1) % 4;
      let p = players[currentTurn];
      
      p.drawnTile = deck.shift();
      processFlowers(currentTurn);

      if (currentTurn === 0) {
        gameState = 'playing';
        updateStatus("輪到你出牌");
        render();
      } else {
        updateStatus(`${p.name} 思考中...`);
        render();
        setTimeout(() => botPlay(currentTurn), 800);
      }
    }

    function botPlay(botId) {
      let p = players[botId];
      let allTiles = [...p.hand, p.drawnTile].filter(t => t !== null);
      let randomIndex = Math.floor(Math.random() * allTiles.length);
      let tileToDiscard = allTiles[randomIndex];

      if (p.drawnTile && p.drawnTile.id === tileToDiscard.id) {
        p.drawnTile = null;
      } else {
        p.hand = p.hand.filter(t => t.id !== tileToDiscard.id);
        if (p.drawnTile) p.hand.push(p.drawnTile); 
        p.drawnTile = null;
        p.hand = sortHand(p.hand);
      }
      processDiscard(tileToDiscard, botId);
    }

    function playerDiscard(tileId, source) {
      if (currentTurn !== 0 || gameState !== 'playing') return;

      let p = players[0];
      let tileToDiscard = null;

      if (source === 'drawn' && p.drawnTile) {
        tileToDiscard = p.drawnTile;
        p.drawnTile = null;
      } else {
        let index = p.hand.findIndex(t => t.id === tileId);
        if (index > -1) {
          tileToDiscard = p.hand.splice(index, 1)[0];
          if (p.drawnTile) {
            p.hand.push(p.drawnTile);
            p.drawnTile = null;
          }
          p.hand = sortHand(p.hand);
        }
      }

      if (tileToDiscard) {
        processDiscard(tileToDiscard, 0);
      }
    }

    function processDiscard(tile, sourceId) {
      sea.push(tile); 
      if (sourceId !== 0) {
        checkPlayerActions(tile, sourceId);
      } else {
        nextTurn();
      }
    }

    function checkPlayerActions(tile, sourceId) {
      let p = players[0];
      actionOptions = { canPong: false, canChi: false };
      
      let sameTiles = p.hand.filter(t => t.weight === tile.weight);
      if (sameTiles.length >= 2) actionOptions.canPong = true;

      if (sourceId === 3 && ['萬','筒','索'].includes(tile.type)) {
        let w = tile.weight;
        let hasM1 = p.hand.some(t => t.weight === w - 1);
        let hasM2 = p.hand.some(t => t.weight === w - 2);
        let hasP1 = p.hand.some(t => t.weight === w + 1);
        let hasP2 = p.hand.some(t => t.weight === w + 2);
        if ((hasM2 && hasM1) || (hasM1 && hasP1) || (hasP1 && hasP2)) {
          actionOptions.canChi = true;
        }
      }

      if (actionOptions.canPong || actionOptions.canChi) {
        gameState = 'waiting_action';
        pendingDiscard = tile;
        updateStatus("吃、碰、還是過？");
        render();
      } else {
        nextTurn();
      }
    }

    function handleAction(actionType) {
      if (gameState !== 'waiting_action') return;
      let p = players[0];

      if (actionType === 'pass') {
        gameState = 'idle';
        pendingDiscard = null;
        nextTurn();
        return;
      }

      if (actionType === 'pong') {
        let tile = sea.pop(); 
        let count = 0;
        p.hand = p.hand.filter(t => {
          if (t.weight === tile.weight && count < 2) { count++; return false; }
          return true;
        });
        p.melds.push(`碰${tile.char}`);
        currentTurn = 0;
        gameState = 'playing';
        pendingDiscard = null;
        updateStatus("碰！請打出一張牌");
        render();
      }

      if (actionType === 'chi') {
        let tile = sea.pop();
        let w = tile.weight;
        let t1, t2;
        let pHandW = p.hand.map(t => t.weight);
        
        if (pHandW.includes(w-1) && pHandW.includes(w+1)) { t1=w-1; t2=w+1; }
        else if (pHandW.includes(w-2) && pHandW.includes(w-1)) { t1=w-2; t2=w-1; }
        else if (pHandW.includes(w+1) && pHandW.includes(w+2)) { t1=w+1; t2=w+2; }

        p.hand = p.hand.filter(t => {
          if (t.weight === t1) { t1 = -1; return false; }
          if (t.weight === t2) { t2 = -1; return false; }
          return true;
        });
        p.melds.push(`吃${tile.char}`);
        currentTurn = 0;
        gameState = 'playing';
        pendingDiscard = null;
        updateStatus("吃！請打出一張牌");
        render();
      }
    }

    // ==========================================
    // 4. 畫面渲染邏輯 (UI 優化)
    // ==========================================

    function updateStatus(text) {
      document.getElementById('game-status').textContent = text;
    }

    function createTileElement(tile, type, onClick) {
      const div = document.createElement('div');
      
      let textColor = 'text-gray-900';
      if (tile.type === '萬') textColor = 'text-red-700';
      if (tile.type === '筒') textColor = 'text-blue-800';
      if (tile.type === '索') textColor = 'text-green-700';
      if (tile.type === '花') textColor = 'text-pink-600';

      // 基礎共用屬性
      let baseClasses = `mahjong-tile relative flex items-center justify-center bg-[#fdfdfc] border-b-[4px] border-r-[2px] border-[#d4d4d2] rounded select-none flex-shrink-0 ${textColor}`;

      if (type === 'sea') {
        // 海底的牌
        div.className = `${baseClasses} w-[4vw] h-[5.5vw] max-w-[32px] max-h-[46px] m-[1px] bg-gray-200 border-gray-400 shadow-sm`;
      } else if (type === 'flower') {
        // 花牌區
        div.className = `${baseClasses} w-[3.5vw] h-[4.8vw] max-w-[28px] max-h-[40px] m-[1px] shadow-sm`;
      } else {
        // 玩家手牌：使用相對寬度 vw 計算，100vw / 19張牌的空間約等於 5vw，保證絕對不會超過螢幕
        div.className = `${baseClasses} w-[5vw] h-[7.3vw] max-w-[65px] max-h-[95px] shadow-md hover:-translate-y-2 active:-translate-y-3 transition-transform cursor-pointer`;
        if (type === 'drawn') {
          div.className += ' border-yellow-400 border-b-[4px] -translate-y-1';
        }
      }

      // 針對文字極致放大填滿：使用 scale，並利用 w-full h-full 確保置中
      const spanChar = document.createElement('span');
      // 根據牌的類型給予不同的放大倍率與字體大小基底
      let scaleClass = type === 'sea' || type === 'flower' ? 'scale-[1.2] text-xl md:text-2xl' : 'scale-[1.3] text-[4.5vw] md:text-5xl';
      spanChar.className = `block flex items-center justify-center w-full h-full leading-none transform ${scaleClass}`;
      spanChar.textContent = tile.char;
      div.appendChild(spanChar);

      if (onClick) div.onclick = onClick;
      return div;
    }

    function render() {
      document.getElementById('deck-count').textContent = deck.length;
      document.getElementById('info-p1').textContent = `南: ${players[1].hand.length}張`;
      document.getElementById('info-p2').textContent = `西: ${players[2].hand.length}張`;
      document.getElementById('info-p3').textContent = `北: ${players[3].hand.length}張`;

      const seaContainer = document.getElementById('sea-container');
      seaContainer.innerHTML = '';
      sea.forEach(tile => {
        seaContainer.appendChild(createTileElement(tile, 'sea', null));
      });

      const meldsContainer = document.getElementById('player-melds');
      meldsContainer.innerHTML = '';
      let p0 = players[0];
      p0.flowers.forEach(tile => {
        meldsContainer.appendChild(createTileElement(tile, 'flower', null));
      });
      p0.melds.forEach(m => {
        const span = document.createElement('span');
        span.className = 'bg-emerald-800 border border-emerald-600 px-1.5 py-0.5 rounded text-[10px] md:text-xs text-yellow-200 mx-0.5 flex-shrink-0 shadow-inner font-bold';
        span.textContent = m;
        meldsContainer.appendChild(span);
      });

      const handContainer = document.getElementById('hand-container');
      handContainer.innerHTML = '';
      p0.hand.forEach(tile => {
        handContainer.appendChild(createTileElement(tile, 'hand', () => playerDiscard(tile.id, 'hand')));
      });

      const drawnContainer = document.getElementById('drawn-container');
      drawnContainer.innerHTML = '';
      if (p0.drawnTile) {
        drawnContainer.appendChild(createTileElement(p0.drawnTile, 'drawn', () => playerDiscard(p0.drawnTile.id, 'drawn')));
      }

      const actionBar = document.getElementById('action-bar');
      const btnPong = document.getElementById('btn-pong');
      const btnChi = document.getElementById('btn-chi');
      
      if (gameState === 'waiting_action') {
        actionBar.classList.remove('hidden');
        btnPong.classList.toggle('hidden', !actionOptions.canPong);
        btnChi.classList.toggle('hidden', !actionOptions.canChi);
      } else {
        actionBar.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
